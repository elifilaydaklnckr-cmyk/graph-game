<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Graph Coloring Test</title>

<style>
body{
  font-family: Arial;
  background:#1e2a38;
  color:white;
  text-align:center;
}

canvas{
  background:white;
  margin-top:10px;
  border-radius:10px;
}

button{
  margin:5px;
  padding:10px;
}
</style>
</head>

<body>

<h2>🎮 Graph Coloring</h2>

<div id="menu">
<button onclick="startGame('easy')">Kolay</button>
<button onclick="startGame('medium')">Orta</button>
<button onclick="startGame('hard')">Zor</button>
</div>

<p>Level: <span id="level">1</span> | Süre: <span id="time">60</span></p>

<canvas id="canvas" width="500" height="400"></canvas>

<script>

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let nodes = [];
let level = 1;
let time = 60;
let timer;
let density = 0.3;
let secili = "red";

function startGame(mode){

  if(mode === "easy") density = 0.2;
  if(mode === "medium") density = 0.35;
  if(mode === "hard") density = 0.5;

  document.getElementById("menu").style.display = "none";

  level = 1;

  startLevel();
}

function safeGraph(n){
  let g = [];

  for(let i=0;i<n;i++){
    g.push({x:Math.random()*400+50,y:Math.random()*300+50,r:null,k:[]});
  }

  for(let i=0;i<n-1;i++){
    g[i].k.push(i+1);
    g[i+1].k.push(i);
  }

  for(let i=0;i<n;i++){
    for(let j=i+1;j<n;j++){
      if(Math.random() < density){
        g[i].k.push(j);
        g[j].k.push(i);
      }
    }
  }

  return g;
}

function draw(){
  ctx.clearRect(0,0,500,400);

  nodes.forEach(n=>{
    n.k.forEach(j=>{
      ctx.beginPath();
      ctx.moveTo(n.x,n.y);
      ctx.lineTo(nodes[j].x,nodes[j].y);
      ctx.stroke();
    });
  });

  nodes.forEach(n=>{
    ctx.beginPath();
    ctx.arc(n.x,n.y,18,0,Math.PI*2);
    ctx.fillStyle = n.r || "white";
    ctx.fill();
    ctx.stroke();
  });
}

canvas.addEventListener("click", e=>{
  let r = canvas.getBoundingClientRect();
  let x = e.clientX - r.left;
  let y = e.clientY - r.top;

  nodes.forEach((n,i)=>{
    let dx = x - n.x;
    let dy = y - n.y;

    if(Math.sqrt(dx*dx+dy*dy) < 18){
      n.r = secili;
      draw();
    }
  });
});

function startLevel(){
  nodes = safeGraph(5 + level * 2);

  time = 60;
  document.getElementById("time").innerText = time;

  draw();

  startTimer();

  document.getElementById("level").innerText = level;
}

function startTimer(){
  clearInterval(timer);

  timer = setInterval(()=>{
    time--;
    document.getElementById("time").innerText = time;

    if(time <= 0){
      clearInterval(timer);
      alert("Süre bitti!");
      startLevel();
    }
  },1000);
}

</script>

</body>
</html>
