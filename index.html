<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graf Boyama Labirent</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #ui-panel {
            padding: 20px;
            text-align: center;
        }
        canvas {
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .controls {
            margin-top: 10px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            transition: 0.3s;
        }
        button:hover { background-color: #45a049; }
        .info { color: #555; max-width: 600px; line-height: 1.6; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h1>Graf Boyama Oyunu</h1>
        <p class="info">
            Komşu düğümleri (birbirine bağlı noktaları) <b>farklı renklerde</b> boyamaya çalışın. 
            Noktalara tıklayarak renklerini değiştirebilirsiniz.
        </p>
        <div class="controls">
            <button onclick="resetGraph()">Yeni Graf Oluştur</button>
        </div>
    </div>

    <script>
        let nodes = [];
        let edges = [];
        let colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#1A535C', '#A44200'];
        let nodeCount = 6;

        function setup() {
            createCanvas(700, 450);
            resetGraph();
        }

        function draw() {
            background(255);
            
            // Kenarları çiz (Edge check)
            for (let edge of edges) {
                let n1 = nodes[edge.u];
                let n2 = nodes[edge.v];
                
                // Eğer komşu düğümler aynı renkse (ve gri değillerse) kenarı kırmızı yap
                if (n1.colorIndex === n2.colorIndex && n1.colorIndex !== -1) {
                    stroke(255, 0, 0);
                    strokeWeight(4);
                } else {
                    stroke(200);
                    strokeWeight(2);
                }
                line(n1.x, n1.y, n2.x, n2.y);
            }

            // Düğümleri çiz
            for (let i = 0; i < nodes.length; i++) {
                let n = nodes[i];
                stroke(50);
                strokeWeight(2);
                fill(n.colorIndex === -1 ? 220 : colors[n.colorIndex]);
                ellipse(n.x, n.y, 40, 40);
                
                fill(0);
                noStroke();
                textAlign(CENTER, CENTER);
                text(i + 1, n.x, n.y);
            }
        }

        function mousePressed() {
            for (let n of nodes) {
                let d = dist(mouseX, mouseY, n.x, n.y);
                if (d < 20) {
                    n.colorIndex = (n.colorIndex + 1) % colors.length;
                }
            }
        }

        function resetGraph() {
            nodes = [];
            edges = [];
            // Rastgele düğüm oluşturma
            for (let i = 0; i < nodeCount; i++) {
                nodes.push({
                    x: random(50, width - 50),
                    y: random(50, height - 50),
                    colorIndex: -1
                });
            }
            // Rastgele bağlantılar (Basit bir graf yapısı)
            for (let i = 0; i < nodeCount; i++) {
                for (let j = i + 1; j < nodeCount; j++) {
                    if (random() > 0.6) {
                        edges.push({ u: i, v: j });
                    }
                }
            }
        }
    </script>
</body>
</html>
