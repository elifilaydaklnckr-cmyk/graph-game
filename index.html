<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Min Color Challenge</title>

<style>
body{
  font-family:Arial;
  text-align:center;
  background:#1e2a38;
  color:white;
}

canvas{
  background:white;
  border-radius:10px;
  margin-top:10px;
}

button{
  margin:5px;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  transform:scale(1.1);
}
</style>
</head>

<body>

<h2>🎮 Minimum Renk Challenge</h2>

<p>Hedef: Grafı mümkün olan EN AZ renk ile boya</p>

<p>Level: <span id="level">1</span> | Skor: <span id="score">0</span></p>

<div id="colors"></div>

<canvas id="canvas" width="500" height="400"></canvas>

<br>
<button onclick="nextLevel()">➡ Level Geç</button>

<script>

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let nodes = [];
let level = 1;
let score = 0;
let secili = "red";

let colors = ["red","blue","green","yellow","purple","orange"];

function setColor(c){
  secili = c;
}

function renderColors(){
  document.getElementById("colors").innerHTML =
    colors.map(c =>
      <button style="background:${c}" onclick="setColor('${c}')">${c}</button>
    ).join("");
}

function generateGraph(n){
  let g = [];

  for(let i=0;i<n;i++){
    g.push({x:Math.random()*400+50,y:Math.random()*300+50,r:null,k:[]});
  }

  for(let i=0;i<n;i++){
    for(let j=i+1;j<n;j++){
      if(Math.random() < 0.25){
        g[i].k.push(j);
        g[j].k.push(i);
      }
    }
  }

  return g;
}

function draw(){
  ctx.clearRect(0,0,500,400);

  nodes.forEach(n=>{
    n.k.forEach(j=>{
      ctx.beginPath();
      ctx.moveTo(n.x,n.y);
      ctx.lineTo(nodes[j].x,nodes[j].y);
      ctx.stroke();
    });
  });

  nodes.forEach(n=>{
    ctx.beginPath();
    ctx.arc(n.x,n.y,18,0,Math.PI*2);
    ctx.fillStyle = n.r || "white";
    ctx.fill();
    ctx.stroke();
  });
}

canvas.addEventListener("click", e=>{
  let r = canvas.getBoundingClientRect();
  let x = e.clientX - r.left;
  let y = e.clientY - r.top;

  nodes.forEach((n,i)=>{
    let dx = x - n.x;
    let dy = y - n.y;

    if(Math.sqrt(dx*dx + dy*dy) < 18){

      // komşu kontrol
      for(let k of n.k){
        if(nodes[k].r === secili){
          alert("Bu renk komşuda var!");
          return;
        }
      }

      n.r = secili;
      draw();
    }
  });
});

function nextLevel(){

  let used = new Set(nodes.map(n => n.r));

  score += Math.max(0, 10 - used.size) * 10;

  level++;

  document.getElementById("level").innerText = level;
  document.getElementById("score").innerText = score;

  nodes = generateGraph(5 + level * 2);

  draw();
}

nodes = generateGraph(5);
renderColors();
draw();

</script>

</body>
</html>
