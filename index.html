<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Graph Coloring Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}

h2{margin:10px;}

.card{
  background:rgba(255,255,255,0.08);
  margin:10px auto;
  padding:10px;
  width:85%;
  border-radius:12px;
  backdrop-filter:blur(10px);
}

button{
  margin:5px;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
  background:#ffd369;
  color:black;
}

canvas{
  background:white;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>🎮 Graph Coloring Pro</h2>

<div class="card">
<p>Level: <span id="level">1</span> |
Skor: <span id="score">0</span> |
Süre: <span id="time">60</span></p>

<p>🎯 Optimal renk sayısı: <span id="opt">?</span></p>
<p>📊 Doğruluk: <span id="acc">0</span>%</p>
</div>

<div class="card">
<div id="colors"></div>
</div>

<canvas id="canvas" width="500" height="400"></canvas>

<div class="card">
<button onclick="restartLevel()">🔁 Tekrar Dene</button>
</div>

<script>

let nodes=[];
let level=1;
let score=0;
let time=60;
let timer;
let secili="red";
let density=0.3;

function secRenk(c){secili=c;}

function generateGraph(n,d){
let a=[];
for(let i=0;i<n;i++){
a.push({x:Math.random()*400+50,y:Math.random()*300+50,r:null,k:[]});
}
for(let i=0;i<n;i++){
for(let j=i+1;j<n;j++){
if(Math.random()<d){
a[i].k.push(j);
a[j].k.push(i);
}}}
return a;
}

// GREEDY OPTİMUM HESAP
function greedyColoring(graph){
let colors=["red","blue","green","yellow","purple","orange","pink","cyan"];
let temp=JSON.parse(JSON.stringify(graph));

for(let i=0;i<temp.length;i++){
let used=new Set();
temp[i].k.forEach(j=>{
if(temp[j].r) used.add(temp[j].r);
});
temp[i].r=colors.find(c=>!used.has(c));
}

return new Set(temp.map(n=>n.r)).size;
}

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

function draw(){
ctx.clearRect(0,0,500,400);

nodes.forEach(n=>{
n.k.forEach(j=>{
ctx.beginPath();
ctx.moveTo(n.x,n.y);
ctx.lineTo(nodes[j].x,nodes[j].y);
ctx.stroke();
});
});

nodes.forEach(n=>{
ctx.beginPath();
ctx.arc(n.x,n.y,18,0,Math.PI*2);
ctx.fillStyle=n.r||"white";
ctx.fill();
ctx.stroke();
});
}

canvas.addEventListener("click",e=>{
let r=canvas.getBoundingClientRect();
let x=e.clientX-r.left;
let y=e.clientY-r.top;

nodes.forEach((n,i)=>{
let dx=x-n.x,dy=y-n.y;
if(Math.sqrt(dx*dx+dy*dy)<18){

// ❌ yanlış komşu kontrol
for(let k of n.k){
if(nodes[k].r===secili){
score-=5; // ceza
return;
}
}

n.r=secili;
score+=10;
updateUI();
draw();
checkWin();
}});
});

function checkWin(){
if(nodes.every(n=>n.r)){
clearInterval(timer);

let opt=greedyColoring(nodes);
document.getElementById("opt").innerText=opt;

let used=new Set(nodes.map(n=>n.r)).size;

// 📊 doğruluk
let acc=Math.max(0,Math.round((opt/used)*100));
document.getElementById("acc").innerText=acc;

// 🏆 skor bonus
score+=time+acc;
updateUI();

setTimeout(()=>levelUp(),1000);
}
}

function levelUp(){
level++;
density=Math.min(0.2+level*0.05,0.8);
startLevel();
}

function restartLevel(){
startLevel();
}

function startLevel(){
nodes=generateGraph(4+level*2,density);
time=60;
startTimer();
draw();
}

function startTimer(){
clearInterval(timer);
timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;
if(time<=0){
clearInterval(timer);
alert("Süre bitti!");
startLevel();
}
},1000);
}

function updateUI(){
document.getElementById("level").innerText=level;
document.getElementById("score").innerText=score;
}

function renderColors(){
let colors=["red","blue","green","yellow","purple","orange","pink","cyan"];

document.getElementById("colors").innerHTML=
colors.map(c=>
<button style="background:${c}" onclick="secRenk('${c}')">${c}</button>
).join("");
}

// START
renderColors();
startLevel();

</script>

</body>
</html>
