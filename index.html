<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Graph Coloring Game</title>
</head>

<body>

<h2>Graph Coloring Challenge</h2>

<p>Level: <span id="level">1</span></p>
<p>Skor: <span id="score">0</span></p>
<p>Süre: <span id="time">60</span></p>

<button onclick="secRenk('red')">Kırmızı</button>
<button onclick="secRenk('blue')">Mavi</button>
<button onclick="secRenk('green')">Yeşil</button>
<button onclick="secRenk('yellow')">Sarı</button>

<br><br>

<canvas id="canvas" width="500" height="400" style="border:1px solid black;"></canvas>

<br><br>

<button onclick="yeniLevel()">Yeni Level</button>

<script>

let seciliRenk = "red";
let level = 1;
let score = 0;
let time = 60;
let timer;
let nodes = [];

function secRenk(r){
  seciliRenk = r;
}

// RANDOM GRAF ÜRETİCİ
function generateGraph(n, density){
  let arr = [];

  for(let i=0;i<n;i++){
    arr.push({
      x: Math.random()*400 + 50,
      y: Math.random()*300 + 50,
      renk: null,
      komsular:[]
    });
  }

  for(let i=0;i<n;i++){
    for(let j=i+1;j<n;j++){
      if(Math.random() < density){
        arr[i].komsular.push(j);
        arr[j].komsular.push(i);
      }
    }
  }

  return arr;
}

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

function ciz(){
  ctx.clearRect(0,0,500,400);

  // kenarlar
  nodes.forEach((n)=>{
    n.komsular.forEach(k=>{
      ctx.beginPath();
      ctx.moveTo(n.x,n.y);
      ctx.lineTo(nodes[k].x,nodes[k].y);
      ctx.stroke();
    });
  });

  // düğümler
  nodes.forEach(n=>{
    ctx.beginPath();
    ctx.arc(n.x,n.y,18,0,Math.PI*2);
    ctx.fillStyle = n.renk || "white";
    ctx.fill();
    ctx.stroke();
  });
}

canvas.addEventListener("click", e=>{
  let rect = canvas.getBoundingClientRect();
  let x = e.clientX - rect.left;
  let y = e.clientY - rect.top;

  nodes.forEach((n,i)=>{
    let dx = x - n.x;
    let dy = y - n.y;

    if(Math.sqrt(dx*dx + dy*dy) < 18){
      boya(i);
    }
  });
});

function boya(i){
  let node = nodes[i];

  // komşu kontrolü
  for(let k of node.komsular){
    if(nodes[k].renk === seciliRenk){
      return;
    }
  }

  node.renk = seciliRenk;
  score += 10;
  document.getElementById("score").innerText = score;

  ciz();
  checkWin();
}

function checkWin(){
  if(nodes.every(n => n.renk)){
    clearInterval(timer);
    score += time;
    alert("Level tamam!");
  }
}

function yeniLevel(){
  level++;
  document.getElementById("level").innerText = level;

  let n = 4 + level * 2;
  let density = Math.min(0.2 + level * 0.05, 0.8);

  nodes = generateGraph(n, density);

  time = 60;
  startTimer();

  ciz();
}

function startTimer(){
  clearInterval(timer);

  timer = setInterval(()=>{
    time--;
    document.getElementById("time").innerText = time;

    if(time <= 0){
      clearInterval(timer);
      alert("Süre bitti!");
    }
  },1000);
}

// başlangıç
nodes = generateGraph(5, 0.2);
startTimer();
ciz();

</script>

</body>
</html>
