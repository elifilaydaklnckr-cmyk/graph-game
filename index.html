<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Graph Coloring Game</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#141e30,#243b55);
  color:white;
  text-align:center;
}

h2{margin-top:10px;}

.card{
  background:rgba(255,255,255,0.08);
  width:85%;
  margin:10px auto;
  padding:10px;
  border-radius:12px;
  backdrop-filter:blur(10px);
}

button{
  margin:5px;
  padding:10px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  transform:scale(1.1);
  box-shadow:0 0 10px #fff;
}

canvas{
  background:white;
  border-radius:10px;
  transition:0.5s;
}
</style>
</head>

<body>

<h2>🎮 Graph Coloring Game</h2>

<div class="card" id="menu">
<button onclick="startGame('easy')">🟢 Kolay</button>
<button onclick="startGame('medium')">🟡 Orta</button>
<button onclick="startGame('hard')">🔴 Zor</button>
</div>

<div class="card">
<p>Level: <span id="level">1</span> |
Skor: <span id="score">0</span> |
Süre: <span id="time">60</span></p>

<p>🏆 Rozet: <span id="badge">Başlangıç</span></p>

<div id="colors"></div>

<canvas id="canvas" width="500" height="400"></canvas>

<br>
<button onclick="restartLevel()">🔁 Tekrar Dene</button>
</div>

<script>

let nodes=[];
let level=1;
let score=0;
let time=60;
let timer;
let secili="red";
let density=0.3;

function secRenk(c){secili=c;}

let colors=["red","blue","green","yellow","purple","orange","pink","cyan"];

function renderColors(){
document.getElementById("colors").innerHTML=
colors.map(c=>
<button style="background:${c}" onclick="secRenk('${c}')">${c}</button>
).join("");
}

function safeGraph(n){
let a=[];
for(let i=0;i<n;i++){
a.push({x:Math.random()*400+50,y:Math.random()*300+50,r:null,k:[]});
}

for(let i=0;i<n-1;i++){
a[i].k.push(i+1);
a[i+1].k.push(i);
}

for(let i=0;i<n;i++){
if(Math.random()<0.2){
let j=Math.floor(Math.random()*n);
if(i!==j){
a[i].k.push(j);
a[j].k.push(i);
}}}
return a;
}

let canvas=document.getElementById("canvas");
let ctx=canvas.getContext("2d");

function draw(){
ctx.clearRect(0,0,500,400);

nodes.forEach(n=>{
n.k.forEach(j=>{
ctx.beginPath();
ctx.moveTo(n.x,n.y);
ctx.lineTo(nodes[j].x,nodes[j].y);
ctx.stroke();
});
});

nodes.forEach(n=>{
ctx.beginPath();
ctx.arc(n.x,n.y,18,0,Math.PI*2);
ctx.fillStyle=n.r||"white";
ctx.fill();
ctx.stroke();
});
}

// 🎯 ANİMASYONLAR
function pop(x,y,color){
ctx.fillStyle=color;
ctx.globalAlpha=0.4;
ctx.beginPath();
ctx.arc(x,y,30,0,Math.PI*2);
ctx.fill();
ctx.globalAlpha=1;
}

function shake(){
canvas.style.transform="translateX(5px)";
setTimeout(()=>canvas.style.transform="translateX(-5px)",50);
setTimeout(()=>canvas.style.transform="translateX(0)",100);
}

function glow(){
canvas.style.boxShadow="0 0 20px #00ff88";
setTimeout(()=>canvas.style.boxShadow="none",300);
}

canvas.addEventListener("click",e=>{
let r=canvas.getBoundingClientRect();
let x=e.clientX-r.left;
let y=e.clientY-r.top;

nodes.forEach((n,i)=>{
let dx=x-n.x,dy=y-n.y;

if(Math.sqrt(dx*dx+dy*dy)<18){

for(let k of n.k){
if(nodes[k].r===secili){
score-=5;
shake();
updateUI();
return;
}
}

n.r=secili;
score+=10;

pop(n.x,n.y,secili);
glow();

updateUI();
draw();
checkWin();
}});
});

function checkWin(){
if(nodes.every(n=>n.r)){
clearInterval(timer);

score+=time;

levelUp();
}
}

function levelUp(){
level++;
updateBadge();

startLevel();
}

function updateBadge(){
let b="Başlangıç";
if(level>=3) b="Graf Ustası";
if(level>=6) b="Renk Stratejisti";
if(level>=10) b="Kromatik Efsane";

document.getElementById("badge").innerText=b;
}

function restartLevel(){
startLevel();
}

function startLevel(){
nodes=safeGraph(4+level*2);

time=60;
startTimer();
draw();
}

function startTimer(){
clearInterval(timer);

timer=setInterval(()=>{
time--;
document.getElementById("time").innerText=time;

if(time<=0){
clearInterval(timer);
alert("Süre bitti! Aynı level tekrar.");
restartLevel(); // ❗ level artmaz
}
},1000);
}

function updateUI(){
document.getElementById("level").innerText=level;
document.getElementById("score").innerText=score;
}

function startGame(mode){
if(mode==="easy") density=0.2;
if(mode==="medium") density=0.3;
if(mode==="hard") density=0.5;

document.getElementById("menu").style.display="none";

level=1;
score=0;

renderColors();
startLevel();
updateUI();
}

renderColors();

</script>

</body>
</html>
